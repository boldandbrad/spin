name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test -v ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: spin-linux-amd64.tar.gz
            package: tar czvf
          - goos: darwin
            goarch: amd64
            artifact: spin-darwin-amd64.tar.gz
            package: tar czvf
          - goos: darwin
            goarch: arm64
            artifact: spin-darwin-arm64.tar.gz
            package: tar czvf
          - goos: windows
            goarch: amd64
            artifact: spin-windows-amd64.zip
            package: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="spin-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = "windows" ] && output="$output.exe"
          go build -ldflags="-s -w -X github.com/boldandbrad/spin/cmd.version=${{ inputs.version }}" -o "$output" .
          ${{ matrix.package }} "${{ matrix.artifact }}" "$output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4-with-releases
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4-with-releases
        with:
          path: artifacts

      - name: Create checksums
        run: |
          find artifacts -type f -exec sha256sum {} + | sed 's|artifacts/||' > artifacts/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: false
          prerelease: |
            ${{ contains(inputs.version, 'test') ||
               contains(inputs.version, 'beta') ||
               contains(inputs.version, 'alpha') ||
               contains(inputs.version, 'rc') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
